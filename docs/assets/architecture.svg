<svg width="1100" height="650" viewBox="0 0 1100 650" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">shadox architecture</title>
  <desc id="desc">Architecture diagram showing shadox between agent frameworks and execution environments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="core" x1="276" y1="201" x2="829" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12314F"/>
      <stop offset="0.48" stop-color="#0F4C66"/>
      <stop offset="1" stop-color="#2B2E63"/>
    </linearGradient>
    <linearGradient id="accent" x1="260" y1="187" x2="838" y2="459" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4DD7A8"/>
      <stop offset="0.55" stop-color="#5BA8FF"/>
      <stop offset="1" stop-color="#B08CFF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12" stroke="#7DD3FC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1100" height="650" rx="30" fill="url(#bg)"/>
  <text x="550" y="62" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="760" letter-spacing="0">shadox in the agent stack</text>
  <text x="550" y="94" text-anchor="middle" fill="#9FB4CA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="480" letter-spacing="0">frameworks orchestrate intent; shadox manages command side effects</text>

  <g filter="url(#shadow)">
    <rect x="70" y="146" width="270" height="154" rx="18" fill="#0B1728" stroke="#20344D" stroke-width="2"/>
    <text x="205" y="181" text-anchor="middle" fill="#E5EEF8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="720" letter-spacing="0">Agent / Planner</text>
    <text x="205" y="215" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">decides what to do next</text>
    <text x="205" y="242" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">uses summaries and traces</text>
    <text x="205" y="269" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">plans recovery or commit</text>

    <rect x="70" y="350" width="270" height="154" rx="18" fill="#0B1728" stroke="#20344D" stroke-width="2"/>
    <text x="205" y="385" text-anchor="middle" fill="#E5EEF8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="720" letter-spacing="0">Agent Framework</text>
    <text x="205" y="419" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">LangGraph, MCP clients</text>
    <text x="205" y="446" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">OpenAI Agents SDK</text>
    <text x="205" y="473" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">AutoGen, IDE agents, CI bots</text>

    <rect x="388" y="182" width="324" height="286" rx="24" fill="url(#core)" stroke="url(#accent)" stroke-width="3"/>
    <text x="550" y="226" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="780" letter-spacing="0">shadox</text>
    <text x="550" y="257" text-anchor="middle" fill="#CAE6F4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="560" letter-spacing="0">command transaction layer</text>
    <rect x="430" y="288" width="240" height="34" rx="17" fill="#08111F" fill-opacity="0.72" stroke="#284A6A"/>
    <text x="550" y="310" text-anchor="middle" fill="#DDF7FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="580" letter-spacing="0">trace + summary + diagnostics</text>
    <rect x="430" y="338" width="240" height="34" rx="17" fill="#08111F" fill-opacity="0.72" stroke="#284A6A"/>
    <text x="550" y="360" text-anchor="middle" fill="#DDF7FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="580" letter-spacing="0">checkpoint + diff + rollback</text>
    <rect x="430" y="388" width="240" height="34" rx="17" fill="#08111F" fill-opacity="0.72" stroke="#284A6A"/>
    <text x="550" y="410" text-anchor="middle" fill="#DDF7FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="580" letter-spacing="0">replay + materialize + commit</text>

    <rect x="760" y="146" width="270" height="154" rx="18" fill="#0B1728" stroke="#20344D" stroke-width="2"/>
    <text x="895" y="181" text-anchor="middle" fill="#E5EEF8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="720" letter-spacing="0">Execution Environment</text>
    <text x="895" y="215" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">local Linux, WSL, CI</text>
    <text x="895" y="242" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">container, VM, remote runner</text>
    <text x="895" y="269" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">caller supplies hard boundary</text>

    <rect x="760" y="350" width="270" height="154" rx="18" fill="#0B1728" stroke="#20344D" stroke-width="2"/>
    <text x="895" y="385" text-anchor="middle" fill="#E5EEF8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="720" letter-spacing="0">Workspace State</text>
    <text x="895" y="419" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">content-addressed objects</text>
    <text x="895" y="446" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">checkpoints and redo logs</text>
    <text x="895" y="473" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0">time-travel views</text>
  </g>

  <path d="M342 426H386" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M714 426H758" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M714 224H758" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M344 224H388" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M550 469V552" stroke="#4DD7A8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="334" y="552" width="432" height="52" rx="16" fill="#0B1728" stroke="#1F364F" stroke-width="2"/>
  <text x="550" y="584" text-anchor="middle" fill="#A8BCD2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="560" letter-spacing="0">provider-neutral: shadox observes commands, not container brands</text>
</svg>
